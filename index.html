        /* --- CSS VARIABLES (Design System) --- */
:root {
    --bg-dark: #0f172a;
    --accent-primary: #6366f1;
    --accent-secondary: #a855f7;
    --text-main: #f8fafc;
    --text-dim: #94a3b8;
    --glass-bg: rgba(255, 255, 255, 0.03);
    --glass-border: rgba(255, 255, 255, 0.1);
    --transition-smooth: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
}

/* --- RESET & BASE --- */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background-color: var(--bg-dark);
    background-image: 
        radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
    color: var(--text-main);
    min-height: 100vh;
    /* Removed overflow:hidden to allow scrolling on the 4-box page if needed */
    overflow-x: hidden; 
}

/* --- LAYOUT --- */
.app-container {
    display: grid;
    place-items: center;
    min-height: 100vh;
    padding: 2rem;
    width: 100%;
}

/* --- THE GLASS CARD --- */
.glass-card {
    position: relative;
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 32px;
    padding: 4rem 3rem;
    max-width: 500px;
    width: 100%;
    text-align: center;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    animation: cardEntrance 0.8s ease-out forwards;
}

/* --- TYPOGRAPHY --- */
h1 {
    font-size: clamp(2.5rem, 8vw, 4rem);
    font-weight: 700;
    letter-spacing: -2px;
    background: linear-gradient(to right, #fff, var(--text-dim));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 1rem;
}

.subtitle-fade {
    color: var(--text-dim);
    font-size: 1.1rem;
    margin-bottom: 2.5rem;
    line-height: 1.6;
}

/* --- PROFESSIONAL BUTTON --- */
.prime-btn {
    position: relative;
    padding: 1.2rem 3rem;
    font-size: 1.1rem;
    font-weight: 600;
    color: white;
    background: var(--accent-primary);
    border: none;
    border-radius: 16px;
    cursor: pointer;
    transition: var(--transition-smooth);
    box-shadow: 0 10px 20px -10px var(--accent-primary);
}

.prime-btn:hover {
    transform: translateY(-5px);
    background: var(--accent-secondary);
    box-shadow: 0 20px 40px -15px var(--accent-secondary);
}

/* --- TELEPORT LOGIC --- */
.hidden { display: none !important; }

.exit-animation {
    opacity: 0;
    transform: scale(0.9) translateY(-30px);
    filter: blur(10px);
    transition: var(--transition-smooth);
}

/* --- THE 4 BOXES GRID --- */
.grid-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 25px;
    width: 100%;
    max-width: 1100px;
    animation: gridReveal 0.8s cubic-bezier(0.23, 1, 0.32, 1) forwards;
}

.box {
    background: var(--glass-bg);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid var(--glass-border);
    padding: 4rem 2rem;
    border-radius: 24px;
    text-align: center;
    font-weight: 600;
    color: var(--text-main);
    transition: var(--transition-smooth);
    cursor: pointer;
    font-size: 1.3rem;
    box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
}

.box:hover {
    background: rgba(255, 255, 255, 0.08);
    transform: translateY(-12px) scale(1.02);
    border-color: var(--accent-primary);
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    color: #fff;
}

/* --- KEYFRAMES --- */
@keyframes cardEntrance {
    from { opacity: 0; transform: scale(0.95) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
}

@keyframes gridReveal {
    from { opacity: 0; transform: translateY(40px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
}

@keyframes textBlurReveal {
    from { filter: blur(12px); opacity: 0; }
    to { filter: blur(0); opacity: 1; }
}

.title-reveal { animation: textBlurReveal 1.2s ease-out; }
/* Update your existing .box class to stack icon and text vertically */
.box {
    display: flex;
    flex-direction: column; /* Stacks icon on top of text */
    gap: 1.5rem;             /* Spacing between icon and text */
    padding: 3rem 1.5rem;
    /* ... keep your other box properties ... */
}

/* New lines for the icons */
.box i {
    font-size: 2.5rem;
    background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    transition: var(--transition-smooth);
}

/* Make the icon "pop" when the box is hovered */
.box:hover i {
    transform: scale(1.2) rotate(5deg);
    filter: drop-shadow(0 0 10px var(--accent-primary));
}
/* Stacks icon above text and centers them */
.box {
    display: flex;
    flex-direction: column; 
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
}

/* Professional Gradient Icon Styling */
.box i {
    font-size: 3rem;
    background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    transition: var(--transition-smooth);
}

/* Icon Animation on Hover */
.box:hover i {
    transform: scale(1.2) rotate(-5deg);
    filter: drop-shadow(0 0 15px rgba(99, 102, 241, 0.6));
}
/* Stacks icon above text and centers them */
.box {
    display: flex;
    flex-direction: column; 
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
}

/* Professional Gradient Icon Styling */
.box i {
    font-size: 3rem;
    background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    transition: var(--transition-smooth);
}

/* Icon Animation on Hover */
.box:hover i {
    transform: scale(1.2) rotate(-5deg);
    filter: drop-shadow(0 0 15px rgba(99, 102, 241, 0.6));
}
.box {
    /* ... existing code ... */
    cursor: pointer; /* Changes mouse to a hand icon */
    user-select: none; /* Prevents text from being highlighted when clicking */
}

.box:active {
    transform: scale(0.95); /* Shrinks slightly when clicked for a 'physical' feel */
    background: rgba(255, 255, 255, 0.15);
}

            <div class="content-wrapper">
                <h1 class="title-reveal">Meow</h1>
                <p class="subtitle-fade">By Rupak</p>
